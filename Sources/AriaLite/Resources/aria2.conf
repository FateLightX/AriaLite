# AriaLite bundled aria2 defaults.
# Connection, RPC identity, paths, session files, and limits are supplied at runtime.

################ RPC ################
enable-rpc=true
rpc-allow-origin-all=false
rpc-listen-all=false

################ File system ################
continue=true
auto-file-renaming=false
allow-overwrite=false
auto-save-interval=10
disk-cache=64M
file-allocation=trunc
no-file-allocation-limit=64M

################ Task ################
detach-share-only=true
# check-certificate / ca-certificate set at runtime by EngineManager
max-file-not-found=10
max-tries=0
retry-wait=10
connect-timeout=10
timeout=10
async-dns=false
min-split-size=1M
http-accept-gzip=true
remote-time=true
summary-interval=0
content-disposition-default-utf8=true
