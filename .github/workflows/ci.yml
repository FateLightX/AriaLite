name: Verify and Release

on:
  pull_request:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: write

jobs:
  verify:
    runs-on: macos-26
    env:
      HOME: ${{ github.workspace }}/.build/home
      XDG_CACHE_HOME: ${{ github.workspace }}/.build/cache
      CLANG_MODULE_CACHE_PATH: ${{ github.workspace }}/.build/module-cache
      DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
    steps:
      - uses: actions/checkout@v4
      - name: Validate release tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]
      - name: Verify package and smoke tests
        env:
          APP_VERSION: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name && format('{0}', github.ref_name) || '0.1.4' }}
        run: |
          if [[ "$APP_VERSION" == v* ]]; then
            export APP_VERSION="${APP_VERSION#v}"
          fi
          scripts/verify_release.sh
      - name: Upload release artifacts
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: AriaLite-${{ github.ref_name }}
          path: |
            dist/AriaLite-*.zip
            dist/AriaLite-*.zip.sha256
            THIRD_PARTY_NOTICES.md
            third_party/aria2-next/COPYING
          if-no-files-found: error
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES="AriaLite $VERSION is an ad-hoc-signed developer build for macOS 14 or later. It is not notarized; see the README for Gatekeeper guidance and third-party notices."
          ASSETS=(
            "dist/AriaLite-$VERSION.zip" \
            "dist/AriaLite-$VERSION.zip.sha256" \
            "THIRD_PARTY_NOTICES.md" \
            "third_party/aria2-next/COPYING" \
          )
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "${ASSETS[@]}" --clobber
            gh release edit "$GITHUB_REF_NAME" --title "AriaLite $VERSION" --notes "$NOTES"
          else
            gh release create "$GITHUB_REF_NAME" "${ASSETS[@]}" \
              --title "AriaLite $VERSION" \
              --notes "$NOTES"
          fi
